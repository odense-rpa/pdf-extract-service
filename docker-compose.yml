services:
  pdf-extract:
    build: .
    ports:
      - "9431:8000"
    env_file:
      - path: .env
        required: false
    environment:
      MAX_CONCURRENT_JOBS: "2"
      MAX_FILE_SIZE_MB: "50"
      JOB_TIMEOUT_SECONDS: "300"
      QUEUE_WAIT_SECONDS: "30"
      OCR_LANGUAGES: "eng"
      LOG_LEVEL: "INFO"
      TEMP_DIR: "/tmp"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "8g"
    restart: unless-stopped
